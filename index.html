<!DOCTYPE html>
<html lang='ru'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Sushi Studios</title>
    <style>
        body {
            background-color: black;
            color: limegreen;
            font-family: Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
        }

        .hero {
            text-align: center;
            padding: 4rem 2rem;
        }

        .main-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2rem;
            margin: 3rem auto;
            max-width: 800px;
        }

        .main-button {
            background: limegreen;
            color: black;
            padding: 2rem;
            border: none;
            border-radius: 10px;
            text-decoration: none;
            width: 300px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .main-button:hover {
            background: #00FF00;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
        }

        .divider {
            width: 80%;
            height: 2px;
            background: limegreen;
            margin: 3rem auto;
            opacity: 0.3;
        }

        .projects-section {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            text-align: center;
        }

        .category-switcher {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .category-btn {
            background: none;
            border: 2px solid limegreen;
            color: limegreen;
            padding: 0.8rem 2rem;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .category-btn.active,
        .category-btn:hover {
            background: limegreen;
            color: black;
        }

        .projects-grid {
            display: grid;
            gap: 1.5rem;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        }

        .project-card {
            background: rgba(0, 255, 0, 0.1);
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid limegreen;
            display: none; /* Скрываем все карточки по умолчанию */
        }

        .project-card.active {
            display: block; /* Показываем активные */
        }
    </style>
</head>
<body>

        </div>
    </section>
   <!-- <div class="divider"></div>-->

<section class="projects-section">

<script>// Добавьте эту проверку в обработчик кликов
document.querySelectorAll('.project-card').forEach(card => {
    card.addEventListener('click', function(e) {
        if (!e.target.closest('.category-btn')) { // Игнорируем клики по кнопкам категорий
            const url = this.dataset.url;
            if (url) window.location.href = url;
        }
    });
});
</script>



    <script>
        // Автоматическая настройка переключателя
        document.addEventListener('DOMContentLoaded', function() {
            // Находим все кнопки и карточки
            const buttons = document.querySelectorAll('.category-btn');
            const cards = document.querySelectorAll('.project-card');

            // Функция переключения
            function switchCategory(category) {
                cards.forEach(card => {
                    card.classList.remove('active');
                    if(card.dataset.category === category) {
                        card.classList.add('active');
                    }
                });
            }

            // Обработчик для кнопок
            buttons.forEach(button => {
                button.addEventListener('click', () => {
                    // Убираем активность у всех кнопок
                    buttons.forEach(btn => btn.classList.remove('active'));
                    // Делаем активной текущую
                    button.classList.add('active');
                    // Переключаем категорию
                    switchCategory(button.dataset.category);
                });
            });
        });
    </script>
